# Alembic Configuration for Star Agents Orchestrator

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Truncate slug field to avoid overly long filenames
truncate_slug_length = 40

# Timezone to use when rendering the date in the migration file
timezone = UTC

# Max length of characters to apply to the "slug" field
# revision_environment = false

# Set to 'true' to run the environment during the 'revision' command
# regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions/ directory
# sourceless = false

# Version location specification - can be configured to allow multiple
# version directories to be used simultaneously
# version_locations = %(here)s/bar:%(here)s/bat:migrations/versions

# Version path separator - unix path separator by default
# version_path_separator = :

# Set to 'true' to search source files for revision locations
# search_source_files = true

# Output encoding used when generating revision files
output_encoding = utf-8

# SQLAlchemy URL - will be overridden by env.py using settings
# sqlalchemy.url is intentionally left empty as we load from environment
sqlalchemy.url =


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

# Ruff formatting
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
